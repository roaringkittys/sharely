<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Check your email — Sharely</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #0a0a12; color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 40px; width: 100%; max-width: 420px; text-align: center; }
    .icon { font-size: 48px; margin-bottom: 20px; display: block; }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 10px; }
    p { font-size: 14px; color: #888; line-height: 1.6; margin-bottom: 6px; }
    .email-highlight { color: #a29bfe; font-weight: 600; }
    .btn { display: inline-block; margin-top: 24px; padding: 12px 24px; background: rgba(108,92,231,0.2); border: 1px solid rgba(108,92,231,0.4); border-radius: 12px; color: #a29bfe; font-size: 13px; font-weight: 600; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <span class="icon">📬</span>
    <h1>Check your email</h1>
    <p>We sent a magic login link to</p>
    <p class="email-highlight" id="emailDisplay"></p>
    <p style="margin-top:12px">Click the link in that email to sign in. It expires in 15 minutes.</p>
    <a href="/user-login" class="btn">← Back to sign in</a>
  </div>
  <script>
    const p = new URLSearchParams(window.location.search);
    const e = p.get('email');
    if (e) document.getElementById('emailDisplay').textContent = e;
  </script>
</body>
</html>
