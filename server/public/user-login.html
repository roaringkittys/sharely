<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Sharely</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a12;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
    }
    .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; }
    .logo-icon {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, #6c5ce7, #a29bfe);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; font-weight: 800; color: #fff;
    }
    .logo-text { font-size: 20px; font-weight: 700; }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
    .subtitle { font-size: 13px; color: #888; margin-bottom: 28px; }
    label { display: block; font-size: 11px; font-weight: 600; color: #aaa; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    input {
      width: 100%; padding: 12px 14px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      color: #fff; font-size: 14px; font-family: 'Inter', sans-serif;
      outline: none; transition: border-color 0.2s;
      margin-bottom: 16px;
    }
    input:focus { border-color: #6c5ce7; }
    input::placeholder { color: #555; }
    .btn {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, #6c5ce7, #a29bfe);
      border: none; border-radius: 12px;
      color: #fff; font-size: 14px; font-weight: 700;
      font-family: 'Inter', sans-serif; cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.88; }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .msg { padding: 12px 14px; border-radius: 10px; font-size: 13px; margin-top: 14px; display: none; }
    .msg.error { background: rgba(225,112,85,0.15); border: 1px solid rgba(225,112,85,0.3); color: #e17055; }
    .msg.success { background: rgba(85,239,196,0.12); border: 1px solid rgba(85,239,196,0.3); color: #55efc4; }
    .dev-link { background: rgba(108,92,231,0.12); border: 1px solid rgba(108,92,231,0.3); border-radius: 10px; padding: 12px; margin-top: 14px; font-size: 12px; color: #a29bfe; word-break: break-all; display: none; }
    .footer-link { text-align: center; margin-top: 20px; font-size: 13px; color: #666; }
    .footer-link a { color: #a29bfe; text-decoration: none; }
    .alert-box { padding: 12px 14px; border-radius: 10px; font-size: 13px; margin-bottom: 20px; }
    .alert-error { background: rgba(225,112,85,0.15); border: 1px solid rgba(225,112,85,0.3); color: #e17055; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">S</div>
      <div class="logo-text">Sharely</div>
    </div>
    <h1>Sign in</h1>
    <p class="subtitle">Enter your email to receive a magic login link.</p>
    <div id="urlAlert" class="alert-box alert-error" style="display:none"></div>
    <label>Email Address</label>
    <input type="email" id="emailInput" placeholder="you@example.com" autocomplete="email">
    <button class="btn" id="loginBtn">Send Magic Link</button>
    <div class="msg" id="msg"></div>
    <div class="dev-link" id="devLink"></div>
    <div class="footer-link">No account? <a href="/register">Register here</a></div>
  </div>

  <script>
    function getFingerprint() {
      const str = [navigator.userAgent, navigator.language, screen.width + 'x' + screen.height, new Date().getTimezoneOffset(), navigator.hardwareConcurrency || 0, navigator.platform || ''].join('|');
      let hash = 0;
      for (let i = 0; i < str.length; i++) { hash = ((hash << 5) - hash) + str.charCodeAt(i); hash |= 0; }
      return Math.abs(hash).toString(16).padStart(8, '0');
    }

    // Show URL error if redirected with ?error=...
    const params = new URLSearchParams(window.location.search);
    const errMap = {
      invalid_link: 'This login link is invalid.',
      link_used: 'This login link has already been used. Request a new one.',
      link_expired: 'This login link has expired. Request a new one.',
      account_disabled: 'Your account has been disabled. Contact admin.',
      access_expired: 'Your access has expired. Contact admin.',
    };
    const urlErr = params.get('error');
    if (urlErr && errMap[urlErr]) {
      const el = document.getElementById('urlAlert');
      el.textContent = errMap[urlErr];
      el.style.display = 'block';
    }

    document.getElementById('loginBtn').addEventListener('click', async () => {
      const email = document.getElementById('emailInput').value.trim();
      const btn = document.getElementById('loginBtn');
      if (!email) { const m = document.getElementById('msg'); m.textContent = 'Please enter your email.'; m.className = 'msg error'; m.style.display = 'block'; return; }

      btn.disabled = true;
      btn.textContent = 'Sending...';

      try {
        const res = await fetch('/auth/magic-login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, deviceFingerprint: getFingerprint() })
        });
        const data = await res.json();
        if (data.success) {
          if (data.magic_link) {
            // Dev mode: no email configured, redirect directly
            window.location.href = data.magic_link;
          } else {
            const m = document.getElementById('msg');
            m.textContent = 'Magic link sent! Check your inbox.';
            m.className = 'msg success';
            m.style.display = 'block';
            btn.textContent = 'Link Sent ✓';
          }
        } else {
          const m = document.getElementById('msg');
          m.textContent = data.error || 'Failed to send link.';
          m.className = 'msg error';
          m.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Send Magic Link';
        }
      } catch (e) {
        const m = document.getElementById('msg');
        m.textContent = 'Connection error.';
        m.className = 'msg error';
        m.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Send Magic Link';
      }
    });
  </script>
</body>
</html>
