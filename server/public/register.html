<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Join Sharely</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a12;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 40px;
      width: 100%;
      max-width: 440px;
      backdrop-filter: blur(20px);
    }
    .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; }
    .logo-icon {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, #6c5ce7, #a29bfe);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; font-weight: 800; color: #fff;
    }
    .logo-text { font-size: 20px; font-weight: 700; color: #fff; }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
    .subtitle { font-size: 13px; color: #888; margin-bottom: 28px; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 11px; font-weight: 600; color: #aaa; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    input {
      width: 100%; padding: 12px 14px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      color: #fff; font-size: 14px; font-family: 'Inter', sans-serif;
      outline: none; transition: border-color 0.2s;
    }
    input:focus { border-color: #6c5ce7; }
    input::placeholder { color: #555; }
    .btn {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, #6c5ce7, #a29bfe);
      border: none; border-radius: 12px;
      color: #fff; font-size: 14px; font-weight: 700;
      font-family: 'Inter', sans-serif; cursor: pointer;
      transition: opacity 0.2s; margin-top: 8px;
    }
    .btn:hover { opacity: 0.88; }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .msg {
      padding: 12px 14px; border-radius: 10px;
      font-size: 13px; margin-top: 14px; display: none;
    }
    .msg.error { background: rgba(225,112,85,0.15); border: 1px solid rgba(225,112,85,0.3); color: #e17055; }
    .msg.success { background: rgba(85,239,196,0.12); border: 1px solid rgba(85,239,196,0.3); color: #55efc4; }
    .footer-link { text-align: center; margin-top: 20px; font-size: 13px; color: #666; }
    .footer-link a { color: #a29bfe; text-decoration: none; }
    .token-input { font-family: monospace; letter-spacing: 1px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">S</div>
      <div class="logo-text">Sharely</div>
    </div>
    <h1>Create your account</h1>
    <p class="subtitle">Enter your email and the access token provided to you.</p>

    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="emailInput" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label>Access Token</label>
      <input type="text" id="tokenInput" class="token-input" placeholder="Your access token" autocomplete="off">
    </div>

    <button class="btn" id="registerBtn">Create Account</button>
    <div class="msg" id="msg"></div>

    <div class="footer-link">Already have an account? <a href="/user-login">Sign in</a></div>
  </div>

  <script>
    // Simple device fingerprint
    function getFingerprint() {
      const str = [
        navigator.userAgent,
        navigator.language,
        screen.width + 'x' + screen.height,
        new Date().getTimezoneOffset(),
        navigator.hardwareConcurrency || 0,
        navigator.platform || ''
      ].join('|');
      let hash = 0;
      for (let i = 0; i < str.length; i++) {
        hash = ((hash << 5) - hash) + str.charCodeAt(i);
        hash |= 0;
      }
      return Math.abs(hash).toString(16).padStart(8, '0');
    }

    function showMsg(text, type) {
      const el = document.getElementById('msg');
      el.textContent = text;
      el.className = 'msg ' + type;
      el.style.display = 'block';
    }

    document.getElementById('registerBtn').addEventListener('click', async () => {
      const email = document.getElementById('emailInput').value.trim();
      const token = document.getElementById('tokenInput').value.trim();
      const btn = document.getElementById('registerBtn');
      if (!email || !token) { showMsg('Please fill in all fields.', 'error'); return; }

      btn.disabled = true;
      btn.textContent = 'Creating account...';

      try {
        const res = await fetch('/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, token, deviceFingerprint: getFingerprint() })
        });
        const data = await res.json();
        if (data.success) {
          showMsg('Account created! Sending your login link...', 'success');
          // Auto-trigger magic login
          const lr = await fetch('/auth/magic-login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, deviceFingerprint: getFingerprint() })
          });
          const ld = await lr.json();
          if (ld.magic_link) {
            window.location.href = ld.magic_link;
          } else {
            window.location.href = '/magic-sent?email=' + encodeURIComponent(email);
          }
        } else {
          showMsg(data.error || 'Registration failed.', 'error');
          btn.disabled = false;
          btn.textContent = 'Create Account';
        }
      } catch (e) {
        showMsg('Connection error. Please try again.', 'error');
        btn.disabled = false;
        btn.textContent = 'Create Account';
      }
    });
  </script>
</body>
</html>
