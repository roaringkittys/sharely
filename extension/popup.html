<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Extension | Sharely</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Montserrat:100,200,300,400,500,600,700,800,900&display=swap">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="./sharely-extension.css">
</head>
<body>
  <header class="sticky-top">
    <div class="header-top-content container centered500px">
      <div class="sharely-logo" id="logoImage">
        <span class="logo-icon">S</span>
        <span class="logo-text">Sharely</span>
      </div>
      <div class="search-container" id="searchContainer">
        <i class="fa fa-search search-icon" id="searchIcon"></i>
        <input type="text" id="appSearch" class="form-control" autocomplete="off" placeholder="Connecting..." disabled="disabled">
      </div>
    </div>
    <div class="filters-toggle-wrapper container centered500px">
      <span class="filters-label">Categories</span>
      <i class="fas fa-chevron-down" id="toggleFilters"></i>
    </div>
    <div class="category-filters-container" id="categoryFiltersContainer">
      <div class="category-filters centered500px">
        <button class="btn btn-outline-light category-filter active" data-category="all" id="all-category" disabled="disabled">♾️ All</button>
        <button class="btn btn-outline-light category-filter" data-category="productivity" id="productivity-category" disabled="disabled">⚡ Productivity & AI Tools</button>
        <button class="btn btn-outline-light category-filter" data-category="streaming" id="streaming-category" disabled="disabled">🍿 Entertainment</button>
        <button class="btn btn-outline-light category-filter" data-category="design" id="design-category" disabled="disabled">🖼️ Visual Creation</button>
        <button class="btn btn-outline-light category-filter" data-category="music" id="music-category" disabled="disabled">🎧 Audio & Music</button>
        <button class="btn btn-outline-light category-filter" data-category="education" id="education-category" disabled="disabled">📚 Learning</button>
        <button class="btn btn-outline-light category-filter" data-category="utilities" id="utilities-category" disabled="disabled">⚙️ Essentials</button>
        <button class="btn btn-outline-light category-filter" data-category="proexclusive" id="pro-exclusive-category" disabled="disabled">👑 Pro Exclusive</button>
        <button class="btn btn-outline-light category-filter" data-category="other" id="other-category" disabled="disabled">🌐 Other</button>
      </div>
    </div>
  </header>

  <main class="card text-center card-body gpy">
    <div id="loading" class="full-page-container fadeIn">
      <div class="bouncing-loader"><div></div><div></div><div></div></div>
    </div>
    <div id="loaded" class="row menu d-none fadeIn"></div>
    <div id="errored" class="full-page-container fadeIn d-none">
      <div class="error-box">
        <i class="fas fa-plug error-icon"></i>
        <h3 class="error-title">Not Connected</h3>
        <p class="error-msg" id="errorMsg">Configure your server URL and API key to connect.</p>
        <button class="ud-main-btn mt-3" id="openSettingsFromError">Open Settings</button>
      </div>
    </div>
  </main>

  <footer class="py-2 card-footer justify-content-between">
    <div class="icon-container">
      <i id="safeLogout" class="fas fa-right-from-bracket icon" title="Safely log out"></i>
      <i id="refreshButton" class="fas fa-sync-alt icon" title="Refresh"></i>
      <i id="captureButton" class="fas fa-camera icon icon-capture" title="Capture current site cookies"></i>
      <i id="settingsButton" class="fas fa-cog icon" title="Settings"></i>
      <i id="adminButton" class="fas fa-shield-alt icon" title="Open Admin Dashboard"></i>
    </div>
    <div class="theme-switcher">
      <span class="footer-text" id="footer">Sharely &copy; 2024-2025</span>
      <i id="theme-light" class="fas fa-sun icon" title="Light Mode"></i>
      <i id="theme-dark" class="fas fa-moon icon d-none" title="Dark Mode"></i>
    </div>
  </footer>

  <!-- Notification Modal -->
  <div class="notificationModal" id="notification-0" style="display:none">
    <div class="notificationModal-content"></div>
  </div>

  <!-- Capture Overlay -->
  <div class="capture-overlay" id="captureOverlay">
    <div class="capture-box" id="captureBox">
      <div class="capture-header">
        <h3><i class="fas fa-camera" style="color:#6c5ce7;margin-right:8px"></i>Capture Session</h3>
        <i class="fas fa-times capture-close" id="captureClose"></i>
      </div>
      <div id="captureScanning" style="text-align:center;padding:20px 0">
        <div class="bouncing-loader" style="justify-content:center"><div></div><div></div><div></div></div>
        <p style="font-size:12px;color:#aaa;margin-top:12px">Reading cookies from current tab...</p>
      </div>
      <div id="captureReady" style="display:none">
        <div class="capture-site-info" id="captureSiteInfo"></div>
        <div class="form-field-cap">
          <label>Account Label</label>
          <input type="text" id="captureLabelInput" placeholder="e.g. My Account, Account 2">
        </div>
        <p style="font-size:11px;color:#aaa;margin:8px 0 16px">All <strong id="captureCookieCount">0</strong> cookies will be sent to your Admin Dashboard.</p>
        <button class="capture-confirm-btn" id="captureConfirmBtn">
          <i class="fas fa-upload" style="margin-right:6px"></i>Send to Dashboard
        </button>
      </div>
      <div id="captureError" style="display:none;text-align:center;padding:10px 0">
        <i class="fas fa-exclamation-triangle" style="font-size:28px;color:#e17055;margin-bottom:8px;display:block"></i>
        <p id="captureErrorMsg" style="font-size:12px;color:#e17055"></p>
      </div>
    </div>
  </div>

  <!-- Account Picker -->
  <div class="account-picker-overlay" id="accountPickerOverlay">
    <div class="account-picker-box" id="accountPicker">
      <div class="account-picker-header">
        <h3 id="accountPickerTitle"></h3>
        <i class="fas fa-times account-picker-close" id="accountPickerClose"></i>
      </div>
      <p style="font-size:11px;color:#aaa;margin-bottom:12px">Select an account to log in:</p>
      <div id="accountPickerList"></div>
    </div>
  </div>

  <!-- Settings Overlay -->
  <div class="settingsOverlay" id="settingsOverlay" style="display:none">
    <div class="settingsBox">
      <div class="settingsBox-header">
        <h2>Settings</h2>
        <i class="fas fa-times close-icon" id="closeSettings"></i>
      </div>
      <div class="settingsBox-body">
        <div class="settings-field">
          <label>Admin Server URL</label>
          <input type="text" id="settingServerUrl" placeholder="https://your-app.replit.app">
        </div>
        <div class="settings-field">
          <label>API Key</label>
          <input type="password" id="settingApiKey" placeholder="sk_sharely_...">
        </div>
        <button class="ud-main-btn" id="saveSettingsBtn" style="width:100%;margin-top:12px">Save & Connect</button>
        <div id="settingsStatus" style="margin-top:10px;font-size:12px;text-align:center"></div>
      </div>
    </div>
  </div>

  <script src="./jquery-3.7.1.min.js"></script>
  <script src="./sharely-extension.js"></script>
</body>
</html>
