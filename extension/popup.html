<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sharely</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./popup.css">
</head>
<body>
  <div class="app" id="app">
    <header>
      <div class="header-top">
        <div class="brand">
          <div class="brand-icon">S</div>
          <span class="brand-name">Sharely</span>
        </div>
        <div class="header-actions">
          <button class="icon-btn" id="refreshBtn" title="Refresh">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
          </button>
          <button class="icon-btn" id="settingsBtn" title="Settings">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          </button>
        </div>
      </div>
      <div class="search-bar">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="searchInput" placeholder="Search services..." autocomplete="off">
      </div>
      <div class="categories" id="categories">
        <button class="cat-btn active" data-category="all">All</button>
        <button class="cat-btn" data-category="productivity">Productivity</button>
        <button class="cat-btn" data-category="streaming">Entertainment</button>
        <button class="cat-btn" data-category="design">Design</button>
        <button class="cat-btn" data-category="education">Education</button>
      </div>
    </header>

    <main id="mainContent">
      <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>Connecting to Sharely...</p>
      </div>
      <div class="services-grid" id="servicesGrid" style="display:none"></div>
      <div class="empty-state" id="emptyState" style="display:none">
        <p>No services available</p>
      </div>
    </main>

    <div id="settingsPanel" class="settings-panel" style="display:none">
      <div class="settings-header">
        <h2>Settings</h2>
        <button class="icon-btn" id="closeSettings">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="settings-body">
        <div class="setting-group">
          <label>Admin Server URL</label>
          <input type="text" id="serverUrl" placeholder="https://your-server.replit.app">
        </div>
        <div class="setting-group">
          <label>API Key</label>
          <input type="password" id="apiKey" placeholder="sk_sharely_...">
        </div>
        <button class="btn btn-primary btn-full" id="saveSettings">Save & Connect</button>
        <div class="setting-group" style="margin-top:20px">
          <label>Theme</label>
          <div class="theme-toggle">
            <button class="theme-btn active" data-theme="dark">Dark</button>
            <button class="theme-btn" data-theme="light">Light</button>
          </div>
        </div>
      </div>
    </div>

    <footer>
      <span>Sharely v1.0</span>
    </footer>
  </div>

  <script src="./popup.js"></script>
</body>
</html>
